<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIOB — 程網 AI 節目合集</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,700;0,6..96,900;1,6..96,400&family=Noto+Serif+TC:wght@300;400;500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafaf8;
  --surface:#fff;
  --border:#e8e6e1;
  --text:#1a1a1a;
  --text-dim:#6b6b6b;
  --serif:'Bodoni Moda','Noto Serif TC',serif;
  --sans:'Inter','Noto Serif TC',sans-serif;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}

/* LOGO TEXT */
.logo-text{
  font-family:'Bodoni Moda','Didot','Bodoni MT',Georgia,serif;
  font-weight:900;
  color:#3a3a3a;
  letter-spacing:.08em;
  line-height:1;
  white-space:nowrap;
}

/* HEADER */
.header{
  padding:1.5rem 4rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.header-logo .logo-text{font-size:2rem}
.header-nav{
  display:flex;
  gap:2.5rem;
  font-size:.85rem;
  letter-spacing:.05em;
}
.header-nav a{color:var(--text-dim);transition:color .2s}
.header-nav a:hover{color:var(--text)}

/* HERO */
.hero{
  padding:6rem 4rem 5rem;
  text-align:center;
  max-width:1000px;
  margin:0 auto;
  animation:fadeUp .8s ease-out;
}
.hero-logo{margin-bottom:3rem}
.hero-logo .logo-text{font-size:clamp(5rem,18vw,14rem)}
.hero-tagline{
  font-family:var(--serif);
  font-size:1.15rem;
  font-style:italic;
  color:var(--text-dim);
  margin-bottom:2rem;
  letter-spacing:.02em;
}
.hero-desc{
  font-size:1rem;
  color:var(--text-dim);
  max-width:600px;
  margin:0 auto 3rem;
  line-height:1.9;
}
.hero-desc a{color:var(--text);border-bottom:1px solid var(--border);transition:border-color .2s}
.hero-desc a:hover{border-color:var(--text)}
.hero-stats{
  display:flex;
  justify-content:center;
  gap:4rem;
  margin-bottom:3rem;
}
.stat{text-align:center}
.stat-num{
  display:block;
  font-family:var(--serif);
  font-weight:400;
  font-size:2.5rem;
  line-height:1.2;
  margin-bottom:.25rem;
}
.stat-label{
  font-size:.7rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--text-dim);
}
.cta-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:var(--text);
  color:var(--bg);
  font-size:.85rem;
  font-weight:500;
  letter-spacing:.08em;
  padding:14px 36px;
  border-radius:0;
  transition:opacity .2s;
}
.cta-btn:hover{opacity:.85}

/* DIVIDER */
.divider{max-width:1200px;margin:0 auto;padding:0 4rem}
.divider-line{height:1px;background:var(--border)}

/* EPISODES */
.episodes{max-width:1200px;margin:0 auto;padding:5rem 4rem 6rem}
.section-header{text-align:center;margin-bottom:4rem}
.section-tag{
  font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--text-dim);display:block;margin-bottom:.75rem;
}
.section-header h2{font-family:var(--serif);font-weight:400;font-size:2.5rem;letter-spacing:-.01em}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2rem}
.ep-card{
  background:var(--surface);border:1px solid var(--border);overflow:hidden;
  display:flex;flex-direction:column;transition:transform .3s,box-shadow .3s;
  opacity:0;animation:fadeUp .5s ease-out forwards;
}
.ep-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.ep-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#f0f0f0}
.ep-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.ep-card:hover .ep-thumb img{transform:scale(1.03)}
.ep-duration{
  position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.75);color:#fff;
  font-size:.7rem;font-weight:500;padding:3px 8px;letter-spacing:.03em;
}
.ep-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.25);opacity:0;transition:opacity .3s;
}
.ep-card:hover .ep-play{opacity:1}
.ep-play-icon{
  width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.95);
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.2);
}
.ep-play-icon svg{margin-left:3px}
.ep-info{padding:1.25rem 1.5rem 1.5rem;flex:1;display:flex;flex-direction:column}
.ep-num{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.5rem}
.ep-title{
  font-family:var(--serif);font-weight:700;font-size:1.05rem;line-height:1.5;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.75rem;
}
.ep-meta{font-size:.75rem;color:var(--text-dim);margin-top:auto;letter-spacing:.02em}

/* FOOTER */
.footer{text-align:center;padding:3rem 4rem;border-top:1px solid var(--border);font-size:.8rem;color:var(--text-dim)}
.footer a{color:var(--text);border-bottom:1px solid var(--border)}
.footer-note{font-size:.7rem;margin-top:.5rem;opacity:.5}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .header{padding:1.2rem 1.5rem}
  .hero{padding:4rem 1.5rem 3rem}
  .episodes{padding:3rem 1.5rem 4rem}
  .ep-grid{grid-template-columns:1fr;gap:1.5rem}
  .divider{padding:0 1.5rem}
  .hero-stats{gap:2rem}
}
</style>
</head>
